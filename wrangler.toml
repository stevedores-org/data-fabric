name = "data-fabric-worker"
main = "build/worker/shim.mjs"
compatibility_date = "2026-02-22"
account_id = "f1be33af27cf878e2e81cb29a0d886f7"
workers_dev = true

# Workers Observability — runtime logs, traces, and metrics. Without this
# block, `console.*` output and unhandled exceptions are invisible in the
# dashboard and via `wrangler tail`. Per-env duplicates below pick up the
# same setting since wrangler envs do not inherit observability.
# Lower head_sampling_rate (e.g. 0.1) if log volume becomes a cost concern.
[observability]
enabled = true
head_sampling_rate = 1.0

# ── Custom domain ────────────────────────────────────────────────
[[routes]]
pattern = "data-fabric.stevedores.org/*"
zone_name = "stevedores.org"

# NOTE: Cloudflare Workers Builds (GitHub integration) does NOT honor this
# [build] section. The build command must be set in the CF dashboard:
#   Settings > Build > Build command: bash scripts/build-worker.sh
#   Settings > Build > Deploy command: bunx wrangler@3 deploy
[build]
command = "bash scripts/build-worker.sh"

# deploy: bunx wrangler@3 deploy
# dev:    bunx wrangler@3 dev

[vars]
APP_ENV = "dev"
SERVICE_NAME = "data-fabric"

[durable_objects]
bindings = [
  { name = "TASK_LEASE_MANAGER", class_name = "TaskLeaseManager" },
  { name = "THREAD_MANAGER", class_name = "ThreadManager" },
  { name = "PLAY_MANAGER", class_name = "PlayManager" }
]

[[migrations]]
tag = "v1"
new_classes = ["TaskLeaseManager"]

[[migrations]]
tag = "v2"
new_classes = ["ThreadManager"]

[[migrations]]
tag = "v3"
new_classes = ["PlayManager"]

[ai]
binding = "AI"

[[vectorize]]
binding = "SEMANTIC_INDEX"
index_name = "data-fabric-semantic-index"

# ── D1: structured metadata, lineage, domain entities ───────────
# Create DB: wrangler d1 create data-fabric
# Apply migrations: wrangler d1 migrations apply data-fabric --remote
[[d1_databases]]
binding = "DB"
database_name = "data-fabric"
database_id = "6afcdc53-3d1c-4e99-941c-76b5d1a6fda2"
migrations_dir = "migrations"

# ── R2: artifact / blob store ────────────────────────────────────
# Create bucket: wrangler r2 bucket create data-fabric-artifacts
[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "data-fabric-artifacts"

# ── KV: policies, config, fast context lookups ───────────────────
[[kv_namespaces]]
binding = "POLICY_KV"
id = "33e3087e865c4230b8673ac86dc2dc7d"
preview_id = "45b7cf03cd984f0aaa5a6da2f7a30721"

# ── Queues: provenance event bus, enrichment consumer ─────────────
# Provision queue: bunx wrangler@3 queues create data-fabric-events
# Producer is best-effort in code (graceful fallback if queue unavailable).
# Consumer requires the binding for the #[event(queue)] handler.
[[queues.producers]]
binding = "EVENTS"
queue = "data-fabric-events"

[[queues.consumers]]
queue = "data-fabric-events"
max_batch_size = 50
max_batch_timeout = 5
max_retries = 3
# Messages that exceed max_retries land here instead of being dropped
# silently. Provisioned out-of-band:
#   bunx wrangler queues create data-fabric-events-dlq-dev
dead_letter_queue = "data-fabric-events-dlq-dev"

[triggers]
crons = ["*/10 * * * *"]

# ── Analytics Engine: API latency sink (WS10 pilot KPI #6) ──────
# DEFERRED to a follow-up PR. Enabling AE at the account level alone is
# not sufficient for CF Workers Builds to deploy with the binding —
# diagnosis needs dashboard log access. The worker code in src/lib.rs
# already calls env.analytics_engine("PILOT_LATENCY").ok() and treats
# the missing binding as non-fatal, so KPI #6 (latency p50/p95/p99)
# silently becomes a no-op until this binding is re-added. The other
# five KPIs continue to flow via /v1/metrics/pilot (D1-backed). See
# follow-up issue once filed.
# [[analytics_engine_datasets]]
# binding = "PILOT_LATENCY"
# dataset = "data_fabric_pilot_latency"

# ── Environments: MOM Integration (Phase 4 & 5) ──────────────────

